envs:
  - name: RemoteEnv
    n_envs: 500
    data_source: eb_alfred
    seed: [1, 500, 1]
    max_turns: 5
    response_length_per_turn: 512
    config:
      base_urls:
        - "http://localhost:8000"
      timeout: 600
      eval_set: base
      x_display: "0"
      obs_image_size: 500
      max_turns: 5
      max_actions_per_step: 20
      max_env_steps: 30
      action_sep: ","
      prompt_format: free_think
      use_example_in_sys_prompt: true
      format_reward: 0.1
      success_reward: 1.0
