# EB-Manipulation quick inference test with Claude API.
# Single episode, fewer turns for quick validation.

envs:
  - name: RemoteEnv
    n_envs: 1
    tag_id: eb_manipulation_claude_quick
    seed: [42]
    split: test
    max_turns: 15
    config:
      base_urls:
        - "http://localhost:8001"
      eval_set: base
      selected_indexes: [0]
      max_turns: 15
      max_actions_per_step: 1
      action_sep: ","
      prompt_format: free_think
      use_example_in_sys_prompt: true
      format_reward: 0.1
      success_reward: 1.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

experiment:
  dump_dir: ./test_rollouts/eb_manipulation_claude_quick
  default_max_turns: 15

run:
  backend: claude
  base_seed: 0
  max_concurrent_jobs: 1
  resume: off
  live_summary: true

backends:
  claude:
    api_key: ""
    base_url: null
    model: "claude-sonnet-4-20250514"
    max_concurrency: 1
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
