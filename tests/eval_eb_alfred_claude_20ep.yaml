# EB-ALFRED evaluation: 20 random episodes with Claude API.
#
# Start server first:
#   DISPLAY=:0 conda run -n embench python -m vagen.envs.eb_alfred.serve --port 8000
# Then run:
#   conda run -n vagen python -m vagen.evaluate.run_eval --config tests/eval_eb_alfred_claude_20ep.yaml

envs:
  - name: RemoteEnv
    n_envs: 20
    tag_id: eb_alfred_claude_20ep
    seed: [42]
    seed_list: [100, 207, 315, 423, 531, 639, 747, 855, 963, 1071,
                1179, 1287, 1395, 1503, 1611, 1719, 1827, 1935, 2043, 2151]
    split: test
    max_turns: 30
    config:
      base_urls:
        - "http://localhost:8000"
      eval_set: base
      x_display: "0"
      max_turns: 30
      max_actions_per_step: 1
      action_sep: ","
      prompt_format: free_think
      use_example_in_sys_prompt: true
      format_reward: 0.1
      success_reward: 1.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

experiment:
  dump_dir: ./test_rollouts/claude_20ep
  default_max_turns: 30

run:
  backend: claude
  base_seed: 0
  max_concurrent_jobs: 3
  resume: skip_completed
  live_summary: true

backends:
  claude:
    api_key: ""
    base_url: null
    model: "claude-sonnet-4-20250514"
    max_concurrency: 3
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
