# EB-ALFRED evaluation: 20 episodes, GPT-4.1, 328x328 image resolution.

envs:
  - name: RemoteEnv
    n_envs: 20
    tag_id: eb_alfred_gpt41_328
    seed: [42]
    seed_list: [100, 207, 315, 423, 531, 639, 747, 855, 963, 1071,
                1179, 1287, 1395, 1503, 1611, 1719, 1827, 1935, 2043, 2151]
    split: test
    max_turns: 30
    config:
      base_urls:
        - "http://localhost:8000"
      timeout: 600
      eval_set: base
      x_display: "0"
      obs_image_size: 328
      max_turns: 30
      max_actions_per_step: 1
      action_sep: ","
      prompt_format: free_think
      use_example_in_sys_prompt: true
      format_reward: 0.1
      success_reward: 1.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

experiment:
  dump_dir: ./test_rollouts/gpt41_20ep_328
  default_max_turns: 30

run:
  backend: openai
  base_seed: 0
  max_concurrent_jobs: 1
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: "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"
