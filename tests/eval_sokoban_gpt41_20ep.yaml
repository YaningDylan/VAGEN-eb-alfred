# Sokoban evaluation: 20 random episodes with GPT-4.1.
#
# Run:
#   conda run -n vagen python -m vagen.evaluate.run_eval --config tests/eval_sokoban_gpt41_20ep.yaml

envs:
  - name: Sokoban
    n_envs: 20
    tag_id: sokoban_gpt41_20ep
    seed: [42]
    seed_list: [100, 207, 315, 423, 531, 639, 747, 855, 963, 1071,
                1179, 1287, 1395, 1503, 1611, 1719, 1827, 1935, 2043, 2151]
    split: test
    max_turns: 10
    config:
      dim_room: [6, 6]
      max_steps: 100
      num_boxes: 1
      render_mode: vision
      max_actions_per_step: 3
      action_sep: ","
      use_example_in_sys_prompt: true
      prompt_format: free_think
      format_reward: 0.1
      success_reward: 1.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

experiment:
  dump_dir: ./test_rollouts/sokoban_gpt41_20ep
  default_max_turns: 10

run:
  backend: openai
  base_seed: 0
  max_concurrent_jobs: 5
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: "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"
    base_url: null
    model: "gpt-4.1"
    max_concurrency: 5
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
